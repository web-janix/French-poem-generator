<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <title>AI French Poem Generator</title>
  </head>
  <body>
    <div id="container">
      <header>
        <h1>AI French Poem Generator</h1>
      </header>
      <main>
        <form id="poem-generator-form">
          <input
            type="text"
            id="input"
            placeholder="Enter a theme for your poem (e.g. love, nature, etc.)"
            autofocus
            required
            autocorrect="off"
            class="prompt"
          />
          <button type="submit" class="generate-btn">Generate Poem</button>
        </form>
        <div class="poem" id="poem"></div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/web-janix" target="_blank"
          >Abigail Crafford</a
        >
        and is open sourced on
        <a
          href="https://github.com/web-janix/French-poem-generator"
          target="_blank"
        >
          Github</a
        >
        and is and is hosted on
        <a href="https://ai-french.netlify.app/" target="_blank"> Netlify</a>.
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
